services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mobilno-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
      POSTGRES_DB: game
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d game"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgis_data:
